<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>PT Palipi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0a0a23;
      color: white;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: rgba(0,0,0,0.6);
      position: fixed;
      width: 100%;
    }

    nav h1 {
      color: gold;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1503428593586-e225b39bddfe');
      background-size: cover;
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero span {
      color: gold;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 25px;
      background: gold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* SECTION */
    .section {
      padding: 80px 50px;
      text-align: center;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: black;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>PT Palipi</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Service</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Solusi <span>Event Profesional</span></h1>
    <p>Kami membantu acara Anda menjadi sukses dan berkelas</p>
    <button>Mulai Sekarang</button>
  </div>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Layanan Kami</h2>
  <div class="card-container">
    <div class="card">
      <h3>Event Organizer</h3>
      <p>Mengelola acara profesional</p>
    </div>
    <div class="card">
      <h3>Conference</h3>
      <p>Seminar & konferensi besar</p>
    </div>
    <div class="card">
      <h3>Exhibition</h3>
      <p>Pameran & expo</p>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 PT Palipi</p>
</footer>

</body>
</html>
